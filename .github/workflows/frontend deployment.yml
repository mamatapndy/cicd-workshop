name: Frontend Deployment
on:
  push:
    # paths:
    #   - frontend/**
    #   - e2e-tests/**
    #   - .github/workflows/frontend-deployment.yml
    branches:
      - team3-mamata


jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend  # Adjust the path to your frontend directory


    steps:
    - uses: actions/checkout@v4


    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # Specify the Node.js version you need


    - name: Install Dependencies
      run: npm install


    - name: Run Build
      run: npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
     
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1


    - name: Deploy to S3
      run: |
        echo "${{ secrets.S3_BUCKET_NAME }}"
        aws s3 sync ./build s3://${{ secrets.S3_BUCKET_NAME }} --delete
      #  aws s3 cp ./build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html --cache-control "no-cache"


    - name: Invalidate CloudFront Cache
      uses: chetan/invalidate-cloudfront-action@v2
      env:
        DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} # Store your distribution ID as a secret
        PATHS: "/*" # Invalidate all paths, or specify specific paths like "/index.html /css/*"

  cypress_run:
    name: Run e2e Test
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ success() }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
              cd frontend
              npm install

      - name: Run Cypress tests
        run: |
              cd e2e-tests
              npm install
              npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ vars.FRONTEND_URL }}
          CYPRESS_apiUrl: ${{ vars.BACKEND_URL }}



